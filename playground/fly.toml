# fly.toml — tapflow relay test deployment
# Deploy from monorepo root: fly deploy . --config playground/fly.toml

app = 'tapflow-relay-test'
primary_region = 'sin'

[build]
  dockerfile = "playground/Dockerfile"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[compute]]
  memory_mb = 1024
  cpus = 1

[[mounts]]
  source = 'tapflow_data'
  destination = '/data'
