name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*' # prerelease tags (e.g. v0.8.0-next.0)

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Pin npm: npm@12.0.0 broke provenance signing under trusted publishing
      # ("Cannot find module 'sigstore'"). 11.18.0 is the last known-good line
      # above the trusted-publishing floor. Revisit once npm ships a 12.x fix.
      - run: npm install -g npm@11.18.0

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # All public packages (mcp-server and flow-runner graduated from the
      # experimental dist-tag in 2026-07) go through the single changesets
      # path — it publishes via pnpm, which rewrites workspace:* dependencies
      # to real versions. Never publish these packages with raw `npm publish`:
      # it keeps the literal workspace:* and ships an uninstallable tarball.
      - name: Publish packages
        run: pnpm changeset publish --no-git-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # Tags with a prerelease identifier (e.g. v0.8.0-next.1) are marked as
          # pre-release so GitHub keeps "Latest" on the newest stable release.
          prerelease: ${{ contains(github.ref_name, '-') }}
