name: Bug Report
description: Report a reproducible bug in tapflow
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please check [Troubleshooting](https://tapflow.dev/guide/troubleshooting) and search existing issues.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `tapflow start`
        2. Open the dashboard
        3. Click Boot on device X
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS (simulator)
        - Android (emulator)
        - Both
        - Neither (relay / dashboard / CLI)
    validations:
      required: true

  - type: input
    id: tapflow_version
    attributes:
      label: tapflow version
      placeholder: "e.g. 0.3.1  (run: tapflow --version)"
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version
      placeholder: "e.g. 22.2.0  (run: node --version)"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: macOS version (iOS agent only)
      placeholder: "e.g. macOS 15.4 — leave blank if not applicable"

  - type: input
    id: xcode
    attributes:
      label: Xcode version (iOS agent only)
      placeholder: "e.g. 16.3 — leave blank if not applicable"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Run `tapflow logs` or paste terminal output. Redact tokens and paths if needed.
      render: shell
